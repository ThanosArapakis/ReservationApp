name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore "./src/ReservationApp.core.api/ReservationApp.core.api.csproj"

    - name: Restore NuGet packages
      run: dotnet restore ReservationApp.sln

    - name: Build
      run: dotnet build "./src/ReservationApp.core.api/ReservationApp.core.api.csproj" --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-restore --verbosity normal